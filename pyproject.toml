[project]
name = "toolz-stubs"
version = "0.1.0"
description = "Type stubs for toolz"
readme = "README.md"
authors = [
    { name = "Michael Grinshpon", email = "mgrinshpon@gmail.com" }
]
requires-python = ">=3.12"
dependencies = []

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/toolz", "src/cytoolz", "src/tlz"]

[dependency-groups]
dev = [
    "basedpyright>=1.31.7",
    "ruff>=0.14.1",
    "toolz~=1.0",
    "cytoolz~=1.0",
]

[tool.basedpyright]
typeCheckingMode = "strict"
pythonVersion = "3.12"
include = ["src", "test_*.py"]
